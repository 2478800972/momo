<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <link rel="icon" href="https://cdn.jsdmirror.com/gh/2478800972/boke@main/assets/img/头像.jpg" />
    <title>画廊</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== 背景图层 ===== */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: -2;
        }
        #bgOld {
            opacity: 1;
        }
        #bgNew {
            opacity: 1;
            transform: translate(0, 0);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.88);
            z-index: -1;
            pointer-events: none;
        }

        /* ===== 背景动画 ===== */
        @keyframes slideInLeft {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(0);
            }
        }
        @keyframes slideInRight {
            0% {
                transform: translateX(100%);
            }
            100% {
                transform: translateX(0);
            }
        }
        @keyframes slideInUp {
            0% {
                transform: translateY(-100%);
            }
            100% {
                transform: translateY(0);
            }
        }
        @keyframes slideInDown {
            0% {
                transform: translateY(100%);
            }
            100% {
                transform: translateY(0);
            }
        }
        @keyframes diagonalInTR {
            0% {
                transform: translate(100%, -100%);
            }
            100% {
                transform: translate(0, 0);
            }
        }
        @keyframes diagonalInTL {
            0% {
                transform: translate(-100%, -100%);
            }
            100% {
                transform: translate(0, 0);
            }
        }
        @keyframes diagonalInBR {
            0% {
                transform: translate(100%, 100%);
            }
            100% {
                transform: translate(0, 0);
            }
        }
        @keyframes diagonalInBL {
            0% {
                transform: translate(-100%, 100%);
            }
            100% {
                transform: translate(0, 0);
            }
        }

        .animate-slide-left {
            animation: slideInLeft 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .animate-slide-right {
            animation: slideInRight 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .animate-slide-up {
            animation: slideInUp 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .animate-slide-down {
            animation: slideInDown 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .animate-diagonal-tr {
            animation: diagonalInTR 0.75s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .animate-diagonal-tl {
            animation: diagonalInTL 0.75s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .animate-diagonal-br {
            animation: diagonalInBR 0.75s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .animate-diagonal-bl {
            animation: diagonalInBL 0.75s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(18px) saturate(1.2);
            -webkit-backdrop-filter: blur(18px) saturate(1.2);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding: 0 24px;
        }

        .nav-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 12px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 14px 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.05rem;
            color: #0f172a;
            text-decoration: none;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }
        .logo-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .logo-area span {
            opacity: 0.8;
        }

        /* 比例筛选 — 浅色胶囊 */
        .filter-bar {
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(4px);
            padding: 4px;
            border-radius: 40px;
            border: 1px solid rgba(0, 0, 0, 0.03);
            flex-wrap: wrap;
        }
        .filter-btn {
            border: none;
            background: transparent;
            padding: 6px 20px;
            border-radius: 32px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            color: rgba(15, 23, 42, 0.5);
            letter-spacing: 0.3px;
        }
        .filter-btn:hover {
            color: #0f172a;
            background: rgba(0, 0, 0, 0.04);
        }
        .filter-btn.active {
            background: #ffffff;
            color: #0f172a;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .stats-display {
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(4px);
            padding: 5px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 450;
            color: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(0, 0, 0, 0.03);
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        /* ===== 画廊容器 ===== */
        .gallery-wrapper {
            max-width: 1600px;
            margin: 0 auto;
            padding: 28px 24px 80px;
        }

        .gallery-header {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
            padding: 0 4px;
        }
        .gallery-header .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 20px;
        }
        .gallery-header h1 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #0f172a;
            letter-spacing: -0.3px;
        }
        .gallery-header h1 small {
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(15, 23, 42, 0.35);
            margin-left: 12px;
        }
        .gallery-header .header-actions a {
            color: rgba(15, 23, 42, 0.4);
            text-decoration: none;
            font-size: 0.8rem;
            padding: 6px 16px;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .gallery-header .header-actions a:hover {
            color: #0f172a;
            background: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.08);
        }

        /* ===== 主题分类栏 ===== */
        .theme-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 10px;
            padding: 4px 0 2px;
            border-top: 1px solid rgba(0, 0, 0, 0.03);
            padding-top: 14px;
        }
        .theme-bar .theme-label {
            font-size: 0.7rem;
            font-weight: 450;
            color: rgba(15, 23, 42, 0.25);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-right: 4px;
        }
        .theme-btn {
            border: none;
            background: transparent;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.78rem;
            font-weight: 450;
            cursor: pointer;
            transition: all 0.25s ease;
            color: rgba(15, 23, 42, 0.4);
            letter-spacing: 0.2px;
            border: 1px solid transparent;
        }
        .theme-btn:hover {
            color: #0f172a;
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.04);
        }
        .theme-btn.active {
            background: rgba(0, 0, 0, 0.05);
            color: #0f172a;
            border-color: rgba(0, 0, 0, 0.06);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }
        .theme-btn .count {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-left: 4px;
            font-weight: 400;
        }
        .theme-bar-empty {
            display: none;
        }

        /* ===== 瀑布流 ===== */
        .waterfall {
            width: 100%;
        }
        .waterfall-columns {
            display: flex;
            flex-direction: row;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
        }
        .waterfall-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 0;
        }

        /* ===== 卡片 ===== */
        .gallery-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px) saturate(1.1);
            -webkit-backdrop-filter: blur(8px) saturate(1.1);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02), 0 1px 3px rgba(0, 0, 0, 0.02);
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 100%;
            will-change: transform;
            position: relative;
        }
        .gallery-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.02);
            background: rgba(255, 255, 255, 0.98);
            border-color: #ffffff;
        }

        .img-container {
            position: relative;
            width: 100%;
            background: rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: background 0.3s;
        }
        .img-container.skeleton {
            background: linear-gradient(90deg,
                    rgba(0, 0, 0, 0.02) 25%,
                    rgba(0, 0, 0, 0.06) 50%,
                    rgba(0, 0, 0, 0.02) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s ease-in-out infinite;
        }
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .img-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease, transform 0.6s ease;
            opacity: 0;
        }
        .img-container img.loaded {
            opacity: 1;
        }
        .gallery-card:hover .img-container img {
            transform: scale(1.02);
        }

        /* ===== 加载更多 ===== */
        .load-trigger {
            display: flex;
            justify-content: center;
            padding: 48px 20px 20px;
        }
        .loader-box {
            background: rgba(0, 0, 0, 0.02);
            backdrop-filter: blur(8px);
            padding: 10px 28px;
            border-radius: 60px;
            display: inline-flex;
            gap: 14px;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 450;
            color: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.06);
            border-top-color: rgba(15, 23, 42, 0.3);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .end-message {
            text-align: center;
            padding: 44px 20px;
            color: rgba(15, 23, 42, 0.2);
            background: rgba(0, 0, 0, 0.01);
            border-radius: 48px;
            backdrop-filter: blur(4px);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(15, 23, 42, 0.2);
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        /* ===== 预览模态框 ===== */
        .preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(40px) saturate(1.2);
            -webkit-backdrop-filter: blur(40px) saturate(1.2);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.25s, opacity 0.25s ease;
        }
        .preview-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .preview-box {
            max-width: 94vw;
            max-height: 92vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .preview-box img {
            max-width: 100%;
            max-height: 78vh;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.06);
            background: rgba(0, 0, 0, 0.02);
        }

        .preview-actions {
            display: flex;
            gap: 14px;
            margin-top: 22px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .preview-btn {
            background: rgba(0, 0, 0, 0.02);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.04);
            padding: 7px 24px;
            border-radius: 40px;
            color: rgba(15, 23, 42, 0.6);
            font-size: 0.8rem;
            font-weight: 450;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }
        .preview-btn:hover {
            background: rgba(0, 0, 0, 0.06);
            color: #0f172a;
            transform: scale(1.02);
            border-color: rgba(0, 0, 0, 0.08);
        }

        .close-preview {
            position: absolute;
            top: -48px;
            right: -8px;
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.04);
            color: rgba(15, 23, 42, 0.4);
            font-size: 22px;
            width: 40px;
            height: 40px;
            border-radius: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .close-preview:hover {
            background: rgba(0, 0, 0, 0.06);
            color: #0f172a;
            border-color: rgba(0, 0, 0, 0.08);
        }

        .preview-caption {
            margin-top: 12px;
            font-size: 0.75rem;
            color: rgba(15, 23, 42, 0.2);
            letter-spacing: 0.3px;
            max-width: 90%;
            text-align: center;
            word-break: break-all;
        }

        /* ===== 回到顶部 ===== */
        .back-top {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 0.75rem;
            color: rgba(15, 23, 42, 0.4);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.02);
            cursor: pointer;
            z-index: 99;
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
            display: none;
            align-items: center;
            gap: 6px;
        }
        .back-top:hover {
            background: rgba(255, 255, 255, 0.95);
            color: #0f172a;
            transform: scale(1.03);
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 900px) {
            .waterfall-columns {
                gap: 16px;
            }
            .waterfall-col {
                gap: 16px;
            }
            .nav-container {
                padding: 10px 0;
            }
            .filter-btn {
                padding: 5px 14px;
                font-size: 0.72rem;
            }
            .gallery-wrapper {
                padding: 20px 16px 60px;
            }
            .gallery-header h1 {
                font-size: 1.2rem;
            }
            .gallery-header h1 small {
                font-size: 0.7rem;
                margin-left: 8px;
                display: block;
                margin-top: 2px;
            }
            .theme-btn {
                font-size: 0.7rem;
                padding: 3px 12px;
            }
        }

        @media (max-width: 640px) {
            .waterfall-columns {
                gap: 12px;
            }
            .waterfall-col {
                gap: 12px;
            }
            .navbar {
                padding: 0 12px;
            }
            .nav-container {
                gap: 10px;
            }
            .logo-area {
                font-size: 0.9rem;
            }
            .logo-icon {
                width: 28px;
                height: 28px;
            }
            .filter-btn {
                padding: 4px 12px;
                font-size: 0.68rem;
            }
            .stats-display {
                font-size: 0.65rem;
                padding: 4px 12px;
            }
            .gallery-wrapper {
                padding: 16px 12px 50px;
            }
            .gallery-header {
                margin-bottom: 16px;
                gap: 10px;
            }
            .gallery-header .top-row {
                gap: 8px 12px;
            }
            .gallery-header h1 {
                font-size: 1.05rem;
            }
            .gallery-header .header-actions a {
                font-size: 0.7rem;
                padding: 4px 12px;
            }
            .theme-bar {
                gap: 4px 8px;
                padding-top: 10px;
            }
            .theme-btn {
                font-size: 0.65rem;
                padding: 2px 10px;
            }
            .theme-btn .count {
                font-size: 0.5rem;
            }
            .back-top {
                bottom: 16px;
                right: 16px;
                padding: 6px 14px;
                font-size: 0.65rem;
            }
            .preview-box img {
                max-height: 65vh;
            }
            .preview-actions {
                gap: 10px;
                margin-top: 16px;
            }
            .preview-btn {
                padding: 5px 16px;
                font-size: 0.7rem;
            }
            .close-preview {
                top: -40px;
                right: -4px;
                width: 34px;
                height: 34px;
                font-size: 18px;
            }
        }

        @media (max-width: 420px) {
            .waterfall-columns {
                gap: 8px;
            }
            .waterfall-col {
                gap: 8px;
            }
            .filter-btn {
                padding: 3px 10px;
                font-size: 0.62rem;
            }
            .gallery-header h1 {
                font-size: 0.95rem;
            }
            .theme-btn {
                font-size: 0.6rem;
                padding: 2px 8px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 双背景图层 ===== -->
    <div id="bgOld" class="bg-layer" style="background-image: url('');"></div>
    <div id="bgNew" class="bg-layer" style="background-image: url('');"></div>

    <!-- ===== 导航栏 ===== -->
    <header class="navbar">
        <div class="nav-container">
            <a href="#" class="logo-area">
                <span class="logo-icon">
                    <img src="https://cdn.jsdmirror.com/gh/2478800972/boke@main/assets/img/头像.jpg" alt="logo" />
                </span>
                <span>墨殇 · 画廊</span>
            </a>

            <!-- 比例筛选（横 / 竖 / 方） -->
            <div class="filter-bar" id="ratioFilterBar">
                <button class="filter-btn active" data-ratio="all">全部</button>
                <button class="filter-btn" data-ratio="horizontal">横图</button>
                <button class="filter-btn" data-ratio="vertical">竖图</button>
                <button class="filter-btn" data-ratio="square">方图</button>
            </div>

            <div class="stats-display" id="statsDisplay">共 0 张</div>
        </div>
    </header>

    <!-- ===== 画廊主体 ===== -->
    <main class="gallery-wrapper">
        <div class="gallery-header">
            <div class="top-row">
                <h1>
                    🕊 影集
                    <small>点击预览 · 主题分类</small>
                </h1>
                <div class="header-actions">
                    <a href="https://momoboke.cc.cd/" target="_blank" rel="noopener noreferrer">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                        博客
                    </a>
                </div>
            </div>

            <!-- ===== 主题分类栏（动态生成） ===== -->
            <div id="themeBar" class="theme-bar theme-bar-empty"></div>
        </div>

        <div id="waterfallContainer" class="waterfall">
            <div id="waterfallColumns" class="waterfall-columns"></div>
        </div>

        <div id="scrollTrigger" class="load-trigger">
            <div class="loader-box">
                <div class="spinner"></div>
                <span>滚动加载</span>
            </div>
        </div>
        <div id="endMessage" style="display: none;" class="end-message">✦ 已加载全部 · 感谢欣赏 ✦</div>
    </main>

    <!-- ===== 回到顶部 ===== -->
    <button id="backTopBtn" class="back-top">↑ 顶部</button>

    <!-- ===== 预览模态框 ===== -->
    <div id="previewModal" class="preview-modal">
        <div class="preview-box">
            <button class="close-preview" id="closePreviewBtn">✕</button>
            <img id="previewImg" src="" alt="preview" />
            <div class="preview-actions">
                <button class="preview-btn" id="downloadBtn">⬇ 下载</button>
                <button class="preview-btn" id="openInNewBtn">↗ 新窗口</button>
            </div>
            <div class="preview-caption" id="previewCaption"></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ================================================================
            //  1. 背景切换（保留原有功能）
            // ================================================================
            const BG_API_URL = 'https://api.lqay.cn/api/zxsjt/?cat=heng';
            let bgInterval = null;
            let isSwitching = false;

            const bgOld = document.getElementById('bgOld');
            const bgNew = document.getElementById('bgNew');

            const animations = [
                'animate-slide-left', 'animate-slide-right',
                'animate-slide-up', 'animate-slide-down',
                'animate-diagonal-tr', 'animate-diagonal-tl',
                'animate-diagonal-br', 'animate-diagonal-bl'
            ];

            function getRandomAnimation() {
                return animations[Math.floor(Math.random() * animations.length)];
            }

            function preloadImage(url) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => resolve(url);
                    img.onerror = () => reject(new Error('预加载失败'));
                    img.src = url;
                });
            }

            async function switchBackground(imageUrl) {
                if (isSwitching) return;
                isSwitching = true;
                try {
                    await preloadImage(imageUrl);
                    const animClass = getRandomAnimation();
                    bgNew.style.backgroundImage = `url(${imageUrl})`;
                    bgNew.style.transform = 'translate(0, 0)';
                    bgNew.classList.remove(...animations);
                    void bgNew.offsetHeight;
                    bgNew.classList.add(animClass);
                    await new Promise(r => setTimeout(r, 720));
                    bgOld.style.backgroundImage = `url(${imageUrl})`;
                    bgNew.style.backgroundImage = '';
                    bgNew.style.transform = 'translate(0, 0)';
                    bgNew.classList.remove(animClass);
                } catch (_) { /* 静默 */ } finally {
                    isSwitching = false;
                }
            }

            async function fetchRandomBackground() {
                try {
                    const resp = await fetch(BG_API_URL);
                    if (!resp.ok) throw new Error('API请求失败');
                    const blob = await resp.blob();
                    const url = URL.createObjectURL(blob);
                    await switchBackground(url);
                    setTimeout(() => URL.revokeObjectURL(url), 3000);
                } catch (_) { /* 静默 */ }
            }

            function startBackgroundRotation() {
                fetchRandomBackground();
                if (bgInterval) clearInterval(bgInterval);
                bgInterval = setInterval(fetchRandomBackground, 6000);
            }

            // ================================================================
            //  2. 核心数据 & 状态
            // ================================================================
            const IMG_TXT_FILE = './img.txt';
            const BATCH_SIZE = 24;

            // 原始数据：每个图片对象 { url, theme, ratio }
            let imageItems = [];
            // 当前筛选后的数据（引用，不修改原数据）
            let filteredItems = [];
            // 主题列表
            let themeList = [];
            // 当前筛选状态
            let currentTheme = 'all'; // 'all' 或具体主题名
            let currentRatio = 'all'; // 'all' | 'horizontal' | 'vertical' | 'square'

            let renderedCount = 0;
            let isLoading = false;
            let finished = false;

            let columnElements = [];
            let observer = null;
            let currentPreviewUrl = '';

            const columnsContainer = document.getElementById('waterfallColumns');
            const triggerDiv = document.getElementById('scrollTrigger');
            const endDiv = document.getElementById('endMessage');
            const statsSpan = document.getElementById('statsDisplay');
            const themeBarEl = document.getElementById('themeBar');
            const modalEl = document.getElementById('previewModal');
            const previewImg = document.getElementById('previewImg');
            const previewCaption = document.getElementById('previewCaption');

            // ---- 2-a. 比例分类（通过实际宽高比） ----
            function classifyRatio(naturalWidth, naturalHeight) {
                if (!naturalWidth || !naturalHeight) return 'square';
                const ratio = naturalWidth / naturalHeight;
                if (ratio > 1.25) return 'horizontal';
                if (ratio < 0.8) return 'vertical';
                return 'square';
            }

            function getDefaultPadding(type) {
                if (type === 'horizontal') return '66%';
                if (type === 'vertical') return '140%';
                return '100%';
            }

            // ---- 2-b. 列数 ----
            function getColumnCount() {
                const w = window.innerWidth;
                if (w < 600) return 2;
                if (w < 1024) return 3;
                return 4;
            }

            function initColumns() {
                const count = getColumnCount();
                columnsContainer.innerHTML = '';
                columnElements = [];
                for (let i = 0; i < count; i++) {
                    const col = document.createElement('div');
                    col.className = 'waterfall-col';
                    columnsContainer.appendChild(col);
                    columnElements.push(col);
                }
            }

            // ---- 2-c. 构建卡片 ----
            function buildCard(item) {
                const url = item.url;
                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.dataset.theme = item.theme || '默认';

                const imgWrap = document.createElement('div');
                imgWrap.className = 'img-container skeleton';
                imgWrap.style.paddingBottom = '100%';

                const img = document.createElement('img');
                img.loading = 'lazy';
                img.src = url;
                img.dataset.url = url;

                img.onload = function() {
                    const w = this.naturalWidth;
                    const h = this.naturalHeight;
                    if (w && h) {
                        const ratio = classifyRatio(w, h);
                        item.ratio = ratio;
                        card.dataset.ratio = ratio;
                        const pad = getDefaultPadding(ratio);
                        imgWrap.style.paddingBottom = pad;
                    }
                    this.classList.add('loaded');
                    imgWrap.classList.remove('skeleton');
                };

                img.onerror = function() {
                    imgWrap.classList.remove('skeleton');
                    imgWrap.style.background = 'rgba(0,0,0,0.02)';
                    this.classList.add('loaded');
                    card.dataset.ratio = 'square';
                    item.ratio = 'square';
                };

                imgWrap.appendChild(img);
                card.appendChild(imgWrap);

                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    currentPreviewUrl = url;
                    previewImg.src = url;
                    modalEl.classList.add('active');
                    const filename = url.split('/').pop().split('?')[0] || 'image';
                    const themeLabel = item.theme && item.theme !== '默认' ? ` · ${item.theme}` : '';
                    previewCaption.textContent = (filename.length > 40 ? filename.slice(0, 40) + '…' : filename) +
                    themeLabel;
                });

                return card;
            }

            // ---- 2-d. 添加到最短列 ----
            function addToShortestColumn(card) {
                if (!columnElements.length) return;
                let minCol = columnElements[0];
                let minH = Infinity;
                for (let i = 0; i < columnElements.length; i++) {
                    const h = columnElements[i].offsetHeight || 0;
                    if (h < minH) {
                        minH = h;
                        minCol = columnElements[i];
                    }
                }
                minCol.appendChild(card);
            }

            // ---- 2-e. 渲染批次 ----
            function renderBatch(items) {
                if (!items || !items.length) return;
                items.forEach(item => {
                    addToShortestColumn(buildCard(item));
                });
            }

            // ---- 2-f. 核心筛选逻辑 ----
            function applyFilters() {
                let result = [...imageItems];

                // 主题筛选
                if (currentTheme !== 'all') {
                    result = result.filter(item => item.theme === currentTheme);
                }

                // 比例筛选（只筛选已经加载并确定了比例的项目）
                if (currentRatio !== 'all') {
                    result = result.filter(item => item.ratio === currentRatio);
                }

                return result;
            }

            // ---- 2-g. 刷新视图 ----
            function refreshGallery(resetScroll = true) {
                filteredItems = applyFilters();
                renderedCount = 0;
                finished = false;

                initColumns();

                if (filteredItems.length === 0) {
                    columnsContainer.innerHTML =
                        `<div class="empty-state">✦ 没有匹配的图片 · 试试其他分类 ✦</div>`;
                    if (triggerDiv) triggerDiv.style.display = 'none';
                    if (endDiv) endDiv.style.display = 'block';
                    endDiv.textContent = '✦ 没有匹配的图片 ✦';
                } else {
                    if (triggerDiv) triggerDiv.style.display = 'flex';
                    if (endDiv) endDiv.style.display = 'none';
                    const firstBatch = filteredItems.slice(0, BATCH_SIZE);
                    renderBatch(firstBatch);
                    renderedCount = Math.min(BATCH_SIZE, filteredItems.length);
                    if (renderedCount >= filteredItems.length) finished = true;
                }

                updateUI();
                rebindObserver();
                if (resetScroll) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }

            // ---- 2-h. 加载更多 ----
            async function loadMore() {
                if (isLoading || finished || renderedCount >= filteredItems.length) return;
                isLoading = true;
                const loadText = triggerDiv?.querySelector('span');
                if (loadText) loadText.textContent = '加载中…';

                await new Promise(r => setTimeout(r, 40));

                const end = Math.min(renderedCount + BATCH_SIZE, filteredItems.length);
                const batch = filteredItems.slice(renderedCount, end);
                renderBatch(batch);
                renderedCount = end;

                isLoading = false;
                if (loadText) loadText.textContent = '滚动加载';

                if (renderedCount >= filteredItems.length) {
                    finished = true;
                }
                updateUI();
            }

            // ---- 2-i. UI 更新 ----
            function updateUI() {
                const total = imageItems.length;
                const showing = filteredItems.length;
                statsSpan.textContent = `共 ${total} 张${showing !== total ? ` · 显示 ${showing}` : ''}`;

                if (finished || renderedCount >= filteredItems.length) {
                    if (triggerDiv && filteredItems.length > 0) {
                        triggerDiv.style.display = 'none';
                    }
                    if (endDiv && filteredItems.length > 0) {
                        endDiv.style.display = 'block';
                        endDiv.textContent = '✦ 已加载全部 · 感谢欣赏 ✦';
                    }
                } else {
                    if (triggerDiv && filteredItems.length) {
                        triggerDiv.style.display = 'flex';
                    }
                    if (endDiv) endDiv.style.display = 'none';
                }

                // 更新主题按钮的计数
                document.querySelectorAll('.theme-btn').forEach(btn => {
                    const theme = btn.dataset.theme;
                    const count = theme === 'all' ?
                        imageItems.length :
                        imageItems.filter(item => item.theme === theme).length;
                    const countEl = btn.querySelector('.count');
                    if (countEl) countEl.textContent = `(${count})`;
                });

                // 更新主题按钮激活状态
                document.querySelectorAll('.theme-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === currentTheme);
                });

                // 更新比例按钮激活状态
                document.querySelectorAll('#ratioFilterBar .filter-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.ratio === currentRatio);
                });
            }

            // ---- 2-j. 观察器 ----
            function rebindObserver() {
                if (observer) observer.disconnect();
                if (!triggerDiv) return;
                observer = new IntersectionObserver((entries) => {
                    for (const entry of entries) {
                        if (entry.isIntersecting && !isLoading && !finished && renderedCount < filteredItems
                            .length) {
                            loadMore();
                            break;
                        }
                    }
                }, { rootMargin: '0px 0px 200px 0px', threshold: 0.05 });
                observer.observe(triggerDiv);
            }

            // ================================================================
            //  3. 加载 img.txt 并解析分类
            // ================================================================
            async function loadUrlList() {
                try {
                    const resp = await fetch(IMG_TXT_FILE, { cache: 'no-store' });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const text = await resp.text();
                    const lines = text.split(/\r?\n/);

                    let currentTheme = '默认';
                    let hasThemeMarker = false;
                    const items = [];

                    for (let line of lines) {
                        line = line.trim();
                        if (!line) continue;
                        // 注释行忽略
                        if (line.startsWith('//') || line.startsWith(';')) continue;

                        // 检查是否为分类标记：# 分类名
                        if (line.startsWith('#')) {
                            const themeName = line.replace(/^#\s*/, '').trim();
                            if (themeName) {
                                currentTheme = themeName;
                                hasThemeMarker = true;
                            }
                            continue;
                        }

                        // 否则作为图片 URL
                        if (line.startsWith('http://') || line.startsWith('https://')) {
                            items.push({
                                url: line,
                                theme: currentTheme,
                                ratio: 'square' // 占位，加载后更新
                            });
                        }
                    }

                    if (items.length === 0) throw new Error('img.txt 无有效图片 URL');

                    imageItems = items;

                    // 提取主题列表（排除"默认"如果没有任何 # 标记）
                    const themeSet = new Set();
                    imageItems.forEach(item => {
                        if (item.theme && item.theme !== '默认') {
                            themeSet.add(item.theme);
                        }
                    });

                    // 如果存在明确的主题标记，且"默认"分类下有图片，也加入主题列表
                    if (hasThemeMarker) {
                        const hasDefault = imageItems.some(item => item.theme === '默认');
                        if (hasDefault) themeSet.add('默认');
                    }

                    // 如果没有主题标记，全部归入"默认"，但不在主题栏显示
                    if (!hasThemeMarker) {
                        // 所有图片 theme 设为 '默认'，但主题栏只显示"全部"
                        imageItems.forEach(item => item.theme = '默认');
                        themeList = [];
                    } else {
                        // 有主题标记，将"默认"也加入列表（如果有）
                        themeList = Array.from(themeSet).sort();
                        // 确保"默认"排在最后
                        const idx = themeList.indexOf('默认');
                        if (idx > -1) {
                            themeList.splice(idx, 1);
                            themeList.push('默认');
                        }
                    }

                    // 初始化筛选
                    currentTheme = 'all';
                    currentRatio = 'all';

                    // 生成主题按钮
                    renderThemeButtons();

                    // 第一次渲染
                    filteredItems = applyFilters();
                    initColumns();
                    const firstBatch = filteredItems.slice(0, BATCH_SIZE);
                    renderBatch(firstBatch);
                    renderedCount = Math.min(BATCH_SIZE, filteredItems.length);
                    if (renderedCount >= filteredItems.length) finished = true;

                    updateUI();
                    rebindObserver();

                } catch (err) {
                    console.error(err);
                    columnsContainer.innerHTML =
                        `<div class="empty-state">❌ 加载失败: ${err.message}<br>请确认 img.txt 存在且格式正确</div>`;
                    if (triggerDiv) triggerDiv.style.display = 'none';
                    if (themeBarEl) themeBarEl.classList.add('theme-bar-empty');
                }
            }

            // ================================================================
            //  4. 渲染主题按钮
            // ================================================================
            function renderThemeButtons() {
                themeBarEl.innerHTML = '';
                themeBarEl.classList.remove('theme-bar-empty');

                if (themeList.length === 0) {
                    // 没有主题分类，隐藏主题栏
                    themeBarEl.classList.add('theme-bar-empty');
                    return;
                }

                // 添加"全部"按钮
                const allBtn = document.createElement('button');
                allBtn.className = 'theme-btn active';
                allBtn.dataset.theme = 'all';
                allBtn.innerHTML = '全部 <span class="count">(' + imageItems.length + ')</span>';
                allBtn.addEventListener('click', () => {
                    if (currentTheme === 'all') return;
                    currentTheme = 'all';
                    refreshGallery(true);
                });
                themeBarEl.appendChild(allBtn);

                // 添加各个主题按钮
                themeList.forEach(theme => {
                    const count = imageItems.filter(item => item.theme === theme).length;
                    const btn = document.createElement('button');
                    btn.className = 'theme-btn';
                    btn.dataset.theme = theme;
                    btn.innerHTML = theme + ' <span class="count">(' + count + ')</span>';
                    btn.addEventListener('click', () => {
                        if (currentTheme === theme) return;
                        currentTheme = theme;
                        refreshGallery(true);
                    });
                    themeBarEl.appendChild(btn);
                });

                // 添加标签
                const label = document.createElement('span');
                label.className = 'theme-label';
                label.textContent = '主题';
                themeBarEl.prepend(label);
            }

            // ================================================================
            //  5. 事件绑定
            // ================================================================

            // ---- 5-a. 比例筛选 ----
            document.querySelectorAll('#ratioFilterBar .filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const ratio = btn.dataset.ratio;
                    if (currentRatio === ratio) return;
                    currentRatio = ratio;
                    refreshGallery(true);
                });
            });

            // ---- 5-b. 预览 ----
            document.getElementById('closePreviewBtn').addEventListener('click', () => {
                modalEl.classList.remove('active');
            });
            modalEl.addEventListener('click', (e) => {
                if (e.target === modalEl) modalEl.classList.remove('active');
            });

            document.getElementById('downloadBtn').addEventListener('click', () => {
                if (currentPreviewUrl) {
                    const a = document.createElement('a');
                    a.href = currentPreviewUrl;
                    a.download = currentPreviewUrl.split('/').pop().split('?')[0] || 'image';
                    a.click();
                }
            });

            document.getElementById('openInNewBtn').addEventListener('click', () => {
                if (currentPreviewUrl) window.open(currentPreviewUrl, '_blank');
            });

            // ---- 5-c. 回到顶部 ----
            const backTopBtn = document.getElementById('backTopBtn');
            backTopBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
            window.addEventListener('scroll', () => {
                backTopBtn.style.display = window.scrollY > 500 ? 'flex' : 'none';
            });

            // ---- 5-d. 响应式重排 ----
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    if (filteredItems.length) {
                        const currentItems = filteredItems.slice(0, renderedCount);
                        initColumns();
                        currentItems.forEach(item => {
                            addToShortestColumn(buildCard(item));
                        });
                        rebindObserver();
                    }
                }, 200);
            });

            // ================================================================
            //  6. 启动
            // ================================================================
            startBackgroundRotation();
            loadUrlList();

        })();
    </script>

</body>
</html>
